; ---------------------------------------------------------------------------
; meshcore-node-fw — three firmware images.
;
; The two companion builds pick their transport AT RUNTIME from a detect GPIO
; with an internal pull-down, instead of at compile time like stock MeshCore:
;
;   detect HIGH -> a Flipper is wired to the header -> companion protocol on the
;                  hardware UART. No WiFi, no BLE.
;   detect LOW  -> nothing wired -> wireless transport:
;                  V4   -> WiFi access point + TCP server on port 5000
;                  T114 -> BLE
;
; Decided once at boot. Changing mode means rebooting the node.
;
; Radio parameters (freq / BW / SF / CR) are NOT pinned here — the values coming
; from [arduino_base] are only factory-reset defaults; everything is settable at
; runtime over the companion protocol.
;
; scripts/prepare.py copies this file to external/MeshCore/platformio.local.ini,
; which MeshCore's root platformio.ini already pulls in via `extra_configs`.
; ---------------------------------------------------------------------------

; ===========================================================================
; Heltec T114 (nRF52840) — companion, UART on Serial2 / NRF_UARTE1
;
; Pin numbers come from the official Heltec T114 datasheet (Rev 1.0, §2.2) and
; from variants/heltec_t114/variant.h — not from the silkscreen alone:
;   header P1: GPIO9 = P0.09 (UART1_RX), GPIO10 = P0.10 (UART1_TX), GPIO13 = P0.13
; variant.cpp's g_ADigitalPinMap is the identity for indices >= 2, so the Arduino
; pin number, the Heltec label and the nRF port pin all line up here.
;
; Serial1 (NRF_UARTE0) is wired to the GPS on this board, hence Serial2.
; ===========================================================================
[env:t114_companion]
extends = Heltec_t114
board_build.ldscript = boards/nrf52840_s140_v6_extrafs.ld
board_upload.maximum_size = 712704
build_flags =
  ${Heltec_t114.build_flags}
  -I examples/companion_radio/ui-new
  -D DISPLAY_CLASS=NullDisplayDriver
  -D MAX_CONTACTS=350
  -D MAX_GROUP_CHANNELS=40
  -D OFFLINE_QUEUE_SIZE=256
  ; --- runtime transport selection ---
  -D TRANSPORT_DETECT_PIN=13  ; P0.13, header P1 — free pin next to the UART pads
  -D SERIAL_RX=9              ; P0.09, header P1 "GPIO9"  -> connect to adapter TX
  -D SERIAL_TX=10             ; P0.10, header P1 "GPIO10" -> connect to adapter RX
  ; P0.09/P0.10 are the NFC antenna pins out of reset; release them for GPIO use.
  -D CONFIG_NFCT_PINS_AS_GPIOS
  ; BLE is the wireless half of the auto-detect, so it IS compiled in here.
  -D BLE_PIN_CODE=123456
build_src_filter = ${Heltec_t114.build_src_filter}
  +<helpers/nrf52/SerialBLEInterface.cpp>
  +<../examples/companion_radio/*.cpp>
  +<../examples/companion_radio/ui-new/*.cpp>
lib_deps =
  ${Heltec_t114.lib_deps}
  densaugeo/base64 @ ~1.4.0

; ===========================================================================
; Heltec WiFi LoRa 32 V4 (ESP32-S3) — companion, UART on UART2
;
; GPIO47 / GPIO48 for the UART, GPIO33 for detect. UART1 belongs to the GPS.
; The wireless half is a WiFi ACCESS POINT (not station): at a festival there is
; no network to join, and the field logger talks to the node on 192.168.4.1:5000.
; ===========================================================================
[env:v4_companion]
extends = heltec_v4_oled
build_flags =
  ${heltec_v4_oled.build_flags}
  -I examples/companion_radio/ui-new
  -D DISPLAY_CLASS=SSD1306Display
  -D MAX_CONTACTS=350
  -D MAX_GROUP_CHANNELS=40
  -D OFFLINE_QUEUE_SIZE=256
  ; --- runtime transport selection ---
  -D TRANSPORT_DETECT_PIN=33  ; free GPIO; PSRAM here is quad (uses 26..32)
  -D SERIAL_RX=47             ; -> connect to adapter TX
  -D SERIAL_TX=48             ; -> connect to adapter RX
  -D COMPANION_SERIAL_NUM=2   ; UART2; UART1 belongs to the GPS
  -D TCP_PORT=5000            ; what the field logger connects to
; NOTE: DO NOT ENABLE -->  -D MESH_PACKET_LOGGING=1
; NOTE: DO NOT ENABLE -->  -D MESH_DEBUG=1
build_src_filter = ${heltec_v4_oled.build_src_filter}
  +<helpers/ui/SSD1306Display.cpp>
  +<helpers/ui/MomentaryButton.cpp>
  +<helpers/esp32/SerialWifiInterface.cpp>
  +<../examples/companion_radio/*.cpp>
  +<../examples/companion_radio/ui-new/*.cpp>
lib_deps =
  ${heltec_v4_oled.lib_deps}
  densaugeo/base64 @ ~1.4.0

; ===========================================================================
; Heltec T114 (nRF52840) — stock repeater
;
; No detect pin, no UART patch, no companion: a repeater needs none of it.
; This is upstream's Heltec_t114_without_display_repeater, unmodified, so that
; the repeaters in the mesh behave exactly like everyone else's.
; ===========================================================================
[env:t114_repeater]
extends = Heltec_t114
build_src_filter = ${Heltec_t114.build_src_filter}
  +<../examples/simple_repeater>
build_flags =
  ${Heltec_t114.build_flags}
  -D ADVERT_NAME='"Heltec_T114 Repeater"'
  -D ADVERT_LAT=0.0
  -D ADVERT_LON=0.0
  -D ADMIN_PASSWORD='"password"'
  -D MAX_NEIGHBOURS=50
