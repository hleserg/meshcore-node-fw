; ---------------------------------------------------------------------------
; meshcore-node-fw — three firmware images.
;
; The two companion builds pick their transport AT RUNTIME from a detect GPIO
; with an internal pull-down, instead of at compile time like stock MeshCore:
;
;   detect HIGH -> a Flipper is wired to the header -> companion protocol on the
;                  hardware UART. No WiFi, no BLE.
;   detect LOW  -> nothing wired -> wireless transport:
;                  V4   -> WiFi access point + TCP server on port 5000
;                  T114 -> BLE
;
; Decided once at boot. Changing mode means rebooting the node.
;
; Radio parameters (freq / BW / SF / CR) are NOT pinned here — the values coming
; from [arduino_base] are only factory-reset defaults; everything is settable at
; runtime over the companion protocol.
;
; scripts/prepare.py copies this file to external/MeshCore/platformio.local.ini,
; which MeshCore's root platformio.ini already pulls in via `extra_configs`.
; ---------------------------------------------------------------------------

; ===========================================================================
; Heltec T114 (nRF52840) — companion, UART on Serial2 / NRF_UARTE1
;
; Pin assignment is FIXED — agreed with the человек, the wires get soldered to
; exactly these header positions. Do not substitute other pins.
;
;   GND    = P1 pin 4
;   DETECT = P1 pin 8  = GPIO33 (P1.01)
;   RX     = P1 pin 12 = GPIO9  (P0.09, UART1_RX)
;   TX     = P1 pin 13 = GPIO10 (P0.10, UART1_TX)
;
; Cross-checked against the official Heltec T114 datasheet (Rev 1.0, §2.2) and
; variants/heltec_t114/variant.h. g_ADigitalPinMap is the identity for indices
; >= 2, so Arduino 33 -> P1.01 and Arduino 9/10 -> P0.09/P0.10, exactly as the
; datasheet labels them.
;
; Heltec's "UART1" is NRF_UARTE1, which the Adafruit core exposes as Serial2 —
; Serial1 is NRF_UARTE0 and is wired to the GPS on this board.
; ===========================================================================
[env:t114_companion]
extends = Heltec_t114
board_build.ldscript = boards/nrf52840_s140_v6_extrafs.ld
board_upload.maximum_size = 712704
build_flags =
  ${Heltec_t114.build_flags}
  -I examples/companion_radio/ui-new
  -D DISPLAY_CLASS=NullDisplayDriver
  -D MAX_CONTACTS=350
  -D MAX_GROUP_CHANNELS=40
  -D OFFLINE_QUEUE_SIZE=256
  ; --- runtime transport selection ---
  -D TRANSPORT_DETECT_PIN=33  ; P1 pin 8,  GPIO33 = P1.01
  -D SERIAL_RX=9              ; P1 pin 12, GPIO9  = P0.09 -> connect to adapter TX
  -D SERIAL_TX=10             ; P1 pin 13, GPIO10 = P0.10 -> connect to adapter RX
  -D DETECT_PIN_LABEL='"GPIO33 (P1 pin 8)"'
  -D SERIAL_RX_LABEL='"GPIO9 (P1 pin 12)"'
  -D SERIAL_TX_LABEL='"GPIO10 (P1 pin 13)"'
  ; REQUIRED: P0.09/P0.10 are the NFC antenna pins out of reset. Nothing in the
  ; Heltec board definition, variant.h or upstream platformio.ini sets this, so
  ; without it the UART on these pads simply never works - silently.
  -D CONFIG_NFCT_PINS_AS_GPIOS
  ; BLE is the wireless half of the auto-detect, so it IS compiled in here.
  ; --- the ONE place the BLE pairing pin is defined; same on every node ---
  ; Exactly 6 digits, no leading zero: SerialBLEInterface formats it with "%lu"
  ; into a 6-character passkey, which is all the BLE spec allows.
  ; Upstream's default is 123456, and this board has no display to show a random
  ; one - a published default pin would leave the companion interface (reading
  ; messages, sending as the owner, changing settings) open to anyone in range,
  ; which is the same hole the WiFi passphrase closes on the V4.
  -D BLE_PIN_CODE=534465
build_src_filter = ${Heltec_t114.build_src_filter}
  +<helpers/nrf52/SerialBLEInterface.cpp>
  +<../examples/companion_radio/*.cpp>
  +<../examples/companion_radio/ui-new/*.cpp>
lib_deps =
  ${Heltec_t114.lib_deps}
  densaugeo/base64 @ ~1.4.0

; ===========================================================================
; Heltec WiFi LoRa 32 V4 (ESP32-S3) — companion, UART on UART2
;
; Pin assignment is FIXED — everything on header J2:
;
;   GND    = J2 pin 1
;   DETECT = J2 pin 12 = GPIO33
;   RX     = J2 pin 13 = GPIO47
;   TX     = J2 pin 14 = GPIO48
;
; Avoided on purpose: GPIO26 (J2 pin 15) is SPICS1 on the flash line, GPIO19/20
; are the native USB D-/D+, GPIO0 is the strapping/PRG pin.
;
; The wireless half is a WiFi ACCESS POINT (not a station): at a festival there
; is no network to join, and the field logger talks to the node on
; 192.168.4.1:5000. WPA2-protected - an open AP would hand the companion
; interface, and everything it can do to the node, to anyone in range.
; ===========================================================================
[env:v4_companion]
extends = heltec_v4_oled
build_flags =
  ${heltec_v4_oled.build_flags}
  -I examples/companion_radio/ui-new
  -D DISPLAY_CLASS=SSD1306Display
  -D MAX_CONTACTS=350
  -D MAX_GROUP_CHANNELS=40
  -D OFFLINE_QUEUE_SIZE=256
  ; --- runtime transport selection ---
  -D TRANSPORT_DETECT_PIN=33  ; J2 pin 12
  -D SERIAL_RX=47             ; J2 pin 13 -> connect to adapter TX
  -D SERIAL_TX=48             ; J2 pin 14 -> connect to adapter RX
  -D DETECT_PIN_LABEL='"GPIO33 (J2 pin 12)"'
  -D SERIAL_RX_LABEL='"GPIO47 (J2 pin 13)"'
  -D SERIAL_TX_LABEL='"GPIO48 (J2 pin 14)"'
  -D COMPANION_SERIAL_NUM=2   ; UART2; UART1 belongs to the GPS
  -D TCP_PORT=5000            ; what the field logger connects to
  ; --- the ONE place the AP passphrase is defined; same on every node ---
  -D WIFI_AP_PASSWORD='"romantika"'   ; WPA2; esp_wifi needs >= 8 characters
; NOTE: DO NOT ENABLE -->  -D MESH_PACKET_LOGGING=1
; NOTE: DO NOT ENABLE -->  -D MESH_DEBUG=1
build_src_filter = ${heltec_v4_oled.build_src_filter}
  +<helpers/ui/SSD1306Display.cpp>
  +<helpers/ui/MomentaryButton.cpp>
  +<helpers/esp32/SerialWifiInterface.cpp>
  +<../examples/companion_radio/*.cpp>
  +<../examples/companion_radio/ui-new/*.cpp>
lib_deps =
  ${heltec_v4_oled.lib_deps}
  densaugeo/base64 @ ~1.4.0

; ===========================================================================
; Heltec T114 (nRF52840) — stock repeater
;
; No detect pin, no UART patch, no companion: a repeater needs none of it.
; This is upstream's Heltec_t114_without_display_repeater, unmodified, so that
; the repeaters in the mesh behave exactly like everyone else's.
; ===========================================================================
[env:t114_repeater]
extends = Heltec_t114
build_src_filter = ${Heltec_t114.build_src_filter}
  +<../examples/simple_repeater>
build_flags =
  ${Heltec_t114.build_flags}
  -D ADVERT_NAME='"Heltec_T114 Repeater"'
  -D ADVERT_LAT=0.0
  -D ADVERT_LON=0.0
  -D ADMIN_PASSWORD='"password"'
  -D MAX_NEIGHBOURS=50
