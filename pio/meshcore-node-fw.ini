; ---------------------------------------------------------------------------
; meshcore-node-fw — custom MeshCore companion builds.
;
; Both environments expose the companion protocol on a HARDWARE UART instead of
; USB-CDC / BLE / WiFi, so a Flipper Zero (or any 3V3 USB-UART) can be wired
; straight to the header pins.
;
; Interface priority in examples/companion_radio/main.cpp is
;   WIFI_SSID -> BLE_PIN_CODE -> SERIAL_RX -> Serial (USB).
; Neither WIFI_SSID nor BLE_PIN_CODE is defined below, so SERIAL_RX wins.
;
; Radio parameters (freq / BW / SF / CR) are NOT pinned here — the defaults from
; [arduino_base] are only the factory-reset values and everything is settable at
; runtime over the companion protocol.
;
; scripts/prepare.py copies this file to external/MeshCore/platformio.local.ini,
; which MeshCore's root platformio.ini already pulls in via `extra_configs`.
; ---------------------------------------------------------------------------

; ===========================================================================
; Heltec T114 (nRF52840) — companion protocol on Serial2 / NRF_UARTE1
;
; Header P1 silkscreen "GPIO9"/"GPIO10" == nRF port pins P0.09 / P0.10.
; variants/heltec_t114/variant.cpp maps Arduino pin N -> P0.N one-to-one
; (g_ADigitalPinMap is the identity for N >= 2), and variant.h already declares
;   PIN_SERIAL2_RX (9) / PIN_SERIAL2_TX (10)
; so Arduino pins 9 and 10 are exactly the two pads on the header.
;
; Serial1 (NRF_UARTE0) is wired to the GPS on this board, hence Serial2.
; ===========================================================================
[env:t114_companion_serial]
extends = Heltec_t114
board_build.ldscript = boards/nrf52840_s140_v6_extrafs.ld
board_upload.maximum_size = 712704
build_flags =
  ${Heltec_t114.build_flags}
  -I examples/companion_radio/ui-new
  -D DISPLAY_CLASS=NullDisplayDriver
  -D MAX_CONTACTS=350
  -D MAX_GROUP_CHANNELS=40
  -D OFFLINE_QUEUE_SIZE=256
  ; --- companion protocol on the hardware UART ---
  -D SERIAL_RX=9              ; P0.09, header P1 "GPIO9"  -> connect to adapter TX
  -D SERIAL_TX=10             ; P0.10, header P1 "GPIO10" -> connect to adapter RX
  ; P0.09/P0.10 are the NFC antenna pins out of reset; release them for GPIO use.
  -D CONFIG_NFCT_PINS_AS_GPIOS
  ; --- BLE deliberately off: BLE_PIN_CODE is NOT defined and
  ;     helpers/nrf52/SerialBLEInterface.cpp is NOT in build_src_filter ---
build_src_filter = ${Heltec_t114.build_src_filter}
  +<../examples/companion_radio/*.cpp>
  +<../examples/companion_radio/ui-new/*.cpp>
lib_deps =
  ${Heltec_t114.lib_deps}
  densaugeo/base64 @ ~1.4.0

; ===========================================================================
; Heltec WiFi LoRa 32 V4 (ESP32-S3) — companion protocol on UART2
;
; Header J3 GPIO47 (RX) / GPIO48 (TX). UART1 is claimed by the GPS driver,
; so the companion port is moved to UART2 via COMPANION_SERIAL_NUM.
; ===========================================================================
[env:v4_companion_serial]
extends = heltec_v4_oled
build_flags =
  ${heltec_v4_oled.build_flags}
  -I examples/companion_radio/ui-new
  -D DISPLAY_CLASS=SSD1306Display
  -D MAX_CONTACTS=350
  -D MAX_GROUP_CHANNELS=40
  -D OFFLINE_QUEUE_SIZE=256
  ; --- companion protocol on the hardware UART ---
  -D SERIAL_RX=47             ; header J3 GPIO47 -> connect to adapter TX
  -D SERIAL_TX=48             ; header J3 GPIO48 -> connect to adapter RX
  -D COMPANION_SERIAL_NUM=2   ; UART2; UART1 belongs to the GPS
  ; --- WiFi off: WIFI_SSID is NOT defined ---
  ; --- BLE off: BLE_PIN_CODE is NOT defined and helpers/esp32/*.cpp is NOT built ---
; NOTE: DO NOT ENABLE -->  -D MESH_PACKET_LOGGING=1
; NOTE: DO NOT ENABLE -->  -D MESH_DEBUG=1
build_src_filter = ${heltec_v4_oled.build_src_filter}
  +<helpers/ui/SSD1306Display.cpp>
  +<helpers/ui/MomentaryButton.cpp>
  +<../examples/companion_radio/*.cpp>
  +<../examples/companion_radio/ui-new/*.cpp>
lib_deps =
  ${heltec_v4_oled.lib_deps}
  densaugeo/base64 @ ~1.4.0
