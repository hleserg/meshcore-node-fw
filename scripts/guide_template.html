<!doctype html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#0b0d10">
<title>{{TITLE}} — MeshCore Field Kit</title>
<link rel="manifest" href="app.webmanifest">
<style>
/* Everything is inline on purpose: these guides must open with the network off. */
:root{
  --bg:#0b0d10; --bg2:#12161b; --card:#151a21; --line:#242b34;
  --fg:#dfe5ec; --muted:#8b97a6; --accent:#4ade80; --accent2:#38bdf8;
  --warn:#fbbf24; --danger:#f87171; --tip:#60a5fa; --ok:#4ade80;
  --mono:ui-monospace,SFMono-Regular,"JetBrains Mono",Menlo,Consolas,monospace;
}
*{box-sizing:border-box}
html{-webkit-text-size-adjust:100%}
body{
  margin:0; background:var(--bg); color:var(--fg);
  font:17px/1.7 -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
  overflow-wrap:break-word;
}

/* ---------- sticky header ---------- */
.topbar{
  position:sticky; top:0; z-index:50;
  background:rgba(11,13,16,.92); backdrop-filter:blur(8px);
  border-bottom:1px solid var(--line);
  padding:.6rem max(.9rem,env(safe-area-inset-left));
  display:flex; align-items:center; gap:.7rem;
}
.topbar .home{color:var(--muted); text-decoration:none; font-family:var(--mono); font-size:.85rem; white-space:nowrap}
.topbar .home:hover{color:var(--accent)}
.topbar .doc{font-family:var(--mono); font-size:.85rem; color:var(--accent); overflow:hidden; text-overflow:ellipsis; white-space:nowrap; flex:1}
.toc-toggle{
  margin-left:auto; background:var(--card); color:var(--fg); border:1px solid var(--line);
  border-radius:8px; padding:.5rem .8rem; font:inherit; font-size:.85rem; cursor:pointer; white-space:nowrap;
}
.toc-toggle:hover{border-color:var(--accent)}

/* ---------- layout ---------- */
.wrap{max-width:60rem; margin:0 auto; padding:1.5rem max(1rem,env(safe-area-inset-left)) 6rem}
header.doc-head{margin:.5rem 0 1.5rem}
h1{font-size:1.6rem; line-height:1.25; margin:0 0 .4rem; letter-spacing:-.01em}
.subtitle{color:var(--muted); margin:0; font-size:.95rem}

/* ---------- TOC ---------- */
.toc{
  background:var(--bg2); border:1px solid var(--line); border-radius:12px;
  padding:1rem 1.1rem; margin:0 0 2rem;
}
.toc h2{font-size:.8rem; text-transform:uppercase; letter-spacing:.08em; color:var(--muted);
  margin:0 0 .6rem; font-family:var(--mono)}
.toc-list{list-style:none; margin:0; padding:0}
.toc-list li{margin:.15rem 0}
.toc-list a{color:var(--fg); text-decoration:none; display:block; padding:.4rem .5rem; border-radius:6px; font-size:.95rem}
.toc-list a:hover{background:var(--card); color:var(--accent)}
.toc-l1>a{font-weight:700; color:var(--accent)}
.toc-l2{padding-left:.7rem}
.toc-l3{padding-left:1.7rem; font-size:.88rem}
.toc-l3 a{color:var(--muted)}
.toc[hidden]{display:none}

/* ---------- content ---------- */
/* h1 inside the body marks a major part of the guide ("ЧАСТЬ 1", "ГРАБЛИ") */
.content h1{
  font-size:1.45rem; line-height:1.25; margin:3rem 0 1rem; padding:.9rem 0 .9rem 1rem;
  border-left:4px solid var(--accent); background:linear-gradient(90deg,rgba(74,222,128,.10),transparent 70%);
  border-radius:0 10px 10px 0; letter-spacing:-.01em;
}
.content h1:first-child{margin-top:.5rem}
h2{font-size:1.3rem; margin:2.5rem 0 .8rem; padding-top:.5rem; border-top:1px solid var(--line); line-height:1.3}
h3{font-size:1.1rem; margin:1.8rem 0 .6rem; color:var(--accent2); line-height:1.35}
h4{font-size:1rem; margin:1.3rem 0 .5rem}
h2:first-of-type{border-top:0; margin-top:1rem}
.anchor{color:var(--line); text-decoration:none; margin-left:.45rem; font-weight:400; font-size:.8em}
.anchor:hover{color:var(--accent)}
p{margin:.8rem 0}
ul,ol{padding-left:1.4rem; margin:.8rem 0}
li{margin:.45rem 0}
a{color:var(--accent2)}
hr{border:0; border-top:1px solid var(--line); margin:2rem 0}
strong{color:#fff}
img{max-width:100%; height:auto}

/* inline code */
code{
  font-family:var(--mono); font-size:.88em; background:var(--bg2);
  border:1px solid var(--line); border-radius:5px; padding:.1em .38em;
}

/* ---------- code blocks with copy button ---------- */
/* The button sits in its own strip above the code. Overlaying it on the first
   line hid the tail of long commands - exactly the ones worth copying. */
/* The button sits in normal flow ABOVE the code, not absolutely positioned over
   it. Overlaying it hid the tail of long commands - exactly the ones worth
   copying - and no amount of padding tuning survives a font-size change. */
.code-wrap{
  margin:1.1rem 0; background:#0d1117; border:1px solid var(--line);
  border-radius:10px; overflow:hidden;
}
.code-wrap pre{
  margin:0; background:none; border:0;
  padding:.3rem .95rem 1rem; overflow-x:auto; font-family:var(--mono); font-size:.88rem; line-height:1.55;
}
.code-wrap pre code{background:none; border:0; padding:0; font-size:inherit}
.copy-btn{
  display:block; margin:.5rem .5rem 0 auto;
  background:var(--card); color:var(--muted); border:1px solid var(--line);
  border-radius:7px; padding:.45rem .7rem; font:inherit; font-size:.75rem;
  font-family:var(--mono); cursor:pointer; opacity:.85; transition:all .15s;
}
.copy-btn:hover{opacity:1; color:var(--accent); border-color:var(--accent)}
.copy-btn.copied{color:var(--bg); background:var(--accent); border-color:var(--accent); opacity:1}

/* ---------- callouts ---------- */
.callout{border-radius:12px; padding:.9rem 1rem; margin:1.3rem 0; border:1px solid; border-left-width:4px}
.callout-head{display:flex; align-items:center; gap:.5rem; font-weight:700; margin-bottom:.35rem; font-size:.9rem;
  text-transform:uppercase; letter-spacing:.04em}
.callout-icon{font-size:1.05rem}
.callout-body>:first-child{margin-top:0}
.callout-body>:last-child{margin-bottom:0}
.callout-warning{background:rgba(251,191,36,.08); border-color:var(--warn)}
.callout-warning .callout-head{color:var(--warn)}
.callout-danger{background:rgba(248,113,113,.09); border-color:var(--danger)}
.callout-danger .callout-head{color:var(--danger)}
.callout-tip{background:rgba(96,165,250,.08); border-color:var(--tip)}
.callout-tip .callout-head{color:var(--tip)}
.callout-success{background:rgba(74,222,128,.08); border-color:var(--ok)}
.callout-success .callout-head{color:var(--ok)}

/* ---------- tables ---------- */
.table-wrap{overflow-x:auto; margin:1.2rem 0; border:1px solid var(--line); border-radius:10px}
table{border-collapse:collapse; width:100%; font-size:.92rem; min-width:28rem}
th,td{text-align:left; padding:.65rem .8rem; border-bottom:1px solid var(--line); vertical-align:top}
th{background:var(--bg2); color:var(--accent); font-weight:600; white-space:nowrap;
  font-family:var(--mono); font-size:.82rem; text-transform:uppercase; letter-spacing:.04em}
tr:last-child td{border-bottom:0}
tbody tr:hover{background:rgba(255,255,255,.02)}

/* ---------- task lists ---------- */
.task-list{list-style:none; padding-left:.2rem}
.task-list-item{display:flex; gap:.6rem; align-items:flex-start}
.task-list-item .task-list-control{flex:none; margin-top:.15rem}
.task-list-item input[type=checkbox]{width:1.15rem; height:1.15rem; accent-color:var(--accent)}

/* ---------- back to top ---------- */
.totop{
  position:fixed; right:1rem; bottom:calc(1rem + env(safe-area-inset-bottom)); z-index:60;
  background:var(--card); color:var(--fg); border:1px solid var(--line); border-radius:50%;
  width:3rem; height:3rem; font-size:1.1rem; cursor:pointer; display:none;
  box-shadow:0 4px 16px rgba(0,0,0,.45);
}
.totop.show{display:block}
.totop:hover{border-color:var(--accent); color:var(--accent)}

footer{border-top:1px solid var(--line); margin-top:3rem; padding-top:1.2rem;
  color:var(--muted); font-size:.85rem; font-family:var(--mono)}
footer a{color:var(--muted)}

/* ---------- desktop ---------- */
@media (min-width:900px){
  body{font-size:16.5px}
  .wrap{max-width:72rem; display:grid; grid-template-columns:17rem 1fr; gap:2.5rem; align-items:start}
  header.doc-head{grid-column:1/-1}
  .toc{position:sticky; top:4.2rem; max-height:calc(100vh - 6rem); overflow-y:auto; margin:0}
  .toc[hidden]{display:block}   /* always visible on desktop */
  .toc-toggle{display:none}
  .content{min-width:0}
  h1{font-size:2rem}
}
</style>
</head>
<body>

<div class="topbar">
  <a class="home" href="./">← хаб</a>
  <span class="doc">{{SOURCE_NAME}}</span>
  <button class="toc-toggle" type="button" aria-expanded="false" aria-controls="toc">разделы</button>
</div>

<div class="wrap">
  <header class="doc-head">
    <h1>{{TITLE}}</h1>
    <p class="subtitle">{{SUBTITLE}}</p>
  </header>

  <nav class="toc" id="toc" hidden>
    <h2>Разделы</h2>
    {{TOC}}
  </nav>

  <main class="content">
    {{BODY}}
    <footer>
      <p>Источник: <a href="{{SOURCE_NAME}}" download><code>{{SOURCE_NAME}}</code></a> — правится в репозитории, страница пересобирается сама.</p>
      <p>Страница работает оффлайн. <a href="./">← вернуться в хаб</a></p>
    </footer>
  </main>
</div>

<button class="totop" type="button" aria-label="Наверх">↑</button>

<script>
// Copy buttons are emitted by the build, so every block has one even if this
// script never runs; here we only wire up the behaviour.
document.querySelectorAll('.copy-btn').forEach(function (btn) {
  btn.addEventListener('click', function () {
    var pre = btn.parentElement.querySelector('pre');
    var text = pre ? pre.innerText : '';
    var done = function () {
      var old = btn.textContent;
      btn.textContent = 'Скопировано ✓';
      btn.classList.add('copied');
      setTimeout(function () { btn.textContent = old; btn.classList.remove('copied'); }, 1200);
    };
    if (navigator.clipboard && navigator.clipboard.writeText) {
      navigator.clipboard.writeText(text).then(done, fallback);
    } else { fallback(); }
    function fallback() {
      var ta = document.createElement('textarea');
      ta.value = text; ta.style.position = 'fixed'; ta.style.opacity = '0';
      document.body.appendChild(ta); ta.select();
      try { document.execCommand('copy'); done(); } catch (e) {}
      document.body.removeChild(ta);
    }
  });
});

// TOC toggle (mobile only - CSS keeps it open on desktop)
var toc = document.getElementById('toc');
var toggle = document.querySelector('.toc-toggle');
toggle.addEventListener('click', function () {
  var open = !toc.hasAttribute('hidden');
  if (open) { toc.setAttribute('hidden', ''); } else { toc.removeAttribute('hidden'); }
  toggle.setAttribute('aria-expanded', String(!open));
});
toc.addEventListener('click', function (e) {
  if (e.target.tagName === 'A' && window.matchMedia('(max-width:899px)').matches) {
    toc.setAttribute('hidden', '');
    toggle.setAttribute('aria-expanded', 'false');
  }
});

// Back to top
var totop = document.querySelector('.totop');
addEventListener('scroll', function () {
  totop.classList.toggle('show', scrollY > 600);
}, { passive: true });
totop.addEventListener('click', function () { scrollTo({ top: 0, behavior: 'smooth' }); });

// Offline caching for the guides. Registration failing is fine - the page is
// already self-contained.
if ('serviceWorker' in navigator) {
  addEventListener('load', function () { navigator.serviceWorker.register('sw.js').catch(function () {}); });
}
</script>
</body>
</html>
